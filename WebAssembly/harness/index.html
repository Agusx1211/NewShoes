<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>C&C Zero Hour WebAssembly Harness</title>
    <link rel="stylesheet" href="./harness.css">
  </head>
  <body>
    <main class="shell">
      <canvas id="viewport" width="1280" height="720" aria-label="Game viewport"></canvas>
      <aside class="status" aria-live="polite">
        <div>
          <span class="label">State</span>
          <strong id="state">idle</strong>
        </div>
        <div>
          <span class="label">Frames</span>
          <strong id="frames">0</strong>
        </div>
      </aside>
    </main>
    <script type="module" src="./bridge.js"></script>
  </body>
</html>
