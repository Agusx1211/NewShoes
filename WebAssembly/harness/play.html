<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>C&C Zero Hour — play (wasm)</title>
    <link rel="stylesheet" href="./harness.css">
    <style>
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: rgba(0, 0, 0, 0.88);
        color: #ddd;
        font: 15px/1.5 ui-monospace, monospace;
        text-align: center;
        padding: 1rem;
        z-index: 10;
      }
      #overlay.hidden { display: none; }
      #start {
        font: inherit;
        padding: 0.8rem 2.2rem;
        cursor: pointer;
        background: #1c3d5c;
        color: #fff;
        border: 1px solid #4d90c4;
        border-radius: 4px;
      }
      #progress { max-width: 42rem; color: #9fb6c9; }
      #warning { max-width: 42rem; color: #b08a4f; font-size: 13px; }
      /* Without this, mobile browsers consume touches for scroll/zoom and the
         canvas never sees pointer events. */
      #viewport { touch-action: none; }
    </style>
  </head>
  <body>
    <main class="shell">
      <canvas id="viewport" width="1280" height="720" aria-label="Game viewport" tabindex="0"></canvas>
      <aside class="status" aria-live="polite">
        <div>
          <span class="label">State</span>
          <strong id="state">idle</strong>
        </div>
        <div>
          <span class="label">Frames</span>
          <strong id="frames">0</strong>
        </div>
        <div>
          <span class="label">FPS</span>
          <strong id="fps">-</strong>
        </div>
      </aside>
    </main>
    <div id="overlay">
      <h1>C&amp;C Generals: Zero Hour — real engine, in your browser</h1>
      <div id="warning">
        Starting downloads ~1.3 GB of game archives into browser memory.
        A desktop browser is recommended; most phones will run out of memory.
      </div>
      <button id="start">Start game</button>
      <div id="progress"></div>
    </div>
    <script type="module" src="./bridge.js"></script>
    <script type="module" src="./play.mjs"></script>
  </body>
</html>
