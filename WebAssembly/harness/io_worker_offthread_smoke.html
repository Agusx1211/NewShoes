<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>IO worker off-thread smoke</title>
  </head>
  <body>
    <p>IO worker off-thread smoke harness.</p>
    <script type="module">
      // Drive harness/io_worker.mjs directly to prove it fetches off the main
      // thread while a main-thread rAF heartbeat keeps ticking.
      window.__runIoWorkerSmoke = (payloadUrl) => {
        return new Promise((resolve, reject) => {
          let ready = false;
          let heartbeatTicks = 0;
          let heartbeatRunning = false;

          const worker = new Worker(new URL("./io_worker.mjs", import.meta.url), {
            type: "module",
          });

          const tick = () => {
            if (!heartbeatRunning) {
              return;
            }
            heartbeatTicks += 1;
            requestAnimationFrame(tick);
          };

          const startedAt = performance.now();
          const progressEvents = [];

          worker.onmessage = (event) => {
            const message = event.data ?? {};
            if (message.kind === "progress") {
              // Interim streamed-fetch progress (same id as the request).
              progressEvents.push({
                received: Number(message.received),
                total: Number(message.total),
              });
              return;
            }
            if (message.kind === "ready") {
              ready = true;
              // Start the main-thread heartbeat, then issue the off-thread fetch.
              heartbeatRunning = true;
              requestAnimationFrame(tick);
              const heartbeatBaseline = heartbeatTicks;
              const fetchStartedAt = performance.now();
              worker.postMessage({ id: 1, kind: "fetchArchive", url: payloadUrl });
              worker.__fetchStartedAt = fetchStartedAt;
              worker.__heartbeatBaseline = heartbeatBaseline;
              return;
            }
            if (message.id === 1) {
              if (!message.ok) {
                heartbeatRunning = false;
                reject(new Error(message.error ?? "worker fetch failed"));
                worker.terminate();
                return;
              }
              const buffer = message.bytes;
              const byteLength = buffer.byteLength;
              // A transferred ArrayBuffer is detached on the worker side; on the
              // main side it is a fresh, non-zero buffer. We prove transfer by
              // confirming we received a real ArrayBuffer with the expected size.
              const transferred = buffer instanceof ArrayBuffer && byteLength > 0;
              const heartbeatTicksDuringFetch =
                heartbeatTicks - (worker.__heartbeatBaseline ?? 0);
              const fetchMs = performance.now() - (worker.__fetchStartedAt ?? startedAt);
              worker.__fetchResult = {
                ready,
                byteLength,
                transferred,
                heartbeatTicksDuringFetch,
                fetchMs,
                progressEventCount: progressEvents.length,
                progressMaxReceived: progressEvents.reduce(
                  (max, progress) => Math.max(max, progress.received), 0),
                progressTotal: progressEvents.reduce(
                  (max, progress) => Math.max(max, progress.total), 0),
              };
              // Now run a deliberate 300ms CPU-busy task ON THE WORKER and count
              // main-thread heartbeat ticks during it: the unambiguous proof
              // that heavy off-thread work does not freeze the main thread.
              worker.__busyBaseline = heartbeatTicks;
              worker.postMessage({ id: 2, kind: "busy", ms: 300 });
              return;
            }

            if (message.id === 2) {
              heartbeatRunning = false;
              const heartbeatTicksDuringBusy =
                heartbeatTicks - (worker.__busyBaseline ?? 0);
              const result = worker.__fetchResult ?? {};
              worker.terminate();
              resolve({ ...result, heartbeatTicksDuringBusy });
            }
          };

          worker.onerror = (event) => {
            reject(new Error(event?.message ?? "worker crashed"));
          };

          // Safety timeout.
          setTimeout(() => reject(new Error("io worker smoke timed out")), 15000);
        });
      };

      // fetchToOpfs smoke (P2 "OPFS as the disk"): drive the worker's
      // streamed fetch->OPFS command, then read the OPFS file back on the
      // main thread (async File API) and byte-compare against a direct fetch
      // of the same served payload. Cleans up the OPFS entry afterwards.
      window.__runFetchToOpfsSmoke = async (payloadUrl) => {
        const opfsPath = "cnc-io-smoke/fetch-to-opfs.bin";
        const worker = new Worker(new URL("./io_worker.mjs", import.meta.url), {
          type: "module",
        });
        const progressEvents = [];
        try {
          const response = await new Promise((resolve, reject) => {
            worker.onmessage = (event) => {
              const message = event.data ?? {};
              if (message.kind === "ready") {
                worker.postMessage({ id: 7, kind: "fetchToOpfs", url: payloadUrl, opfsPath });
                return;
              }
              if (message.kind === "progress") {
                progressEvents.push({
                  received: Number(message.received),
                  total: Number(message.total),
                });
                return;
              }
              if (message.id === 7) {
                if (message.ok) {
                  resolve(message);
                } else {
                  reject(new Error(message.error ?? "fetchToOpfs failed"));
                }
              }
            };
            worker.onerror = (event) => reject(new Error(event?.message ?? "worker crashed"));
            setTimeout(() => reject(new Error("fetchToOpfs smoke timed out")), 15000);
          });

          // Read the bytes back from OPFS on the main thread (async API) and
          // compare against a direct fetch of the served payload.
          const root = await navigator.storage.getDirectory();
          const dir = await root.getDirectoryHandle("cnc-io-smoke");
          const fileHandle = await dir.getFileHandle("fetch-to-opfs.bin");
          const opfsBytes = new Uint8Array(await (await fileHandle.getFile()).arrayBuffer());
          const servedBytes = new Uint8Array(await (await fetch(payloadUrl)).arrayBuffer());
          let bytesMatch = opfsBytes.byteLength === servedBytes.byteLength;
          if (bytesMatch) {
            for (let i = 0; i < opfsBytes.byteLength; i += 1) {
              if (opfsBytes[i] !== servedBytes[i]) {
                bytesMatch = false;
                break;
              }
            }
          }
          await root.removeEntry("cnc-io-smoke", { recursive: true });
          return {
            bytesWritten: Number(response.bytesWritten),
            opfsByteLength: opfsBytes.byteLength,
            servedByteLength: servedBytes.byteLength,
            bytesMatch,
            progressEventCount: progressEvents.length,
            progressTotal: progressEvents.reduce((max, p) => Math.max(max, p.total), 0),
            progressMaxReceived: progressEvents.reduce((max, p) => Math.max(max, p.received), 0),
          };
        } finally {
          worker.terminate();
        }
      };
    </script>
  </body>
</html>
