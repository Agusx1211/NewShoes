<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111513">
    <meta name="description" content="The finalized Project New Shoes launcher identity.">
    <title>Project New Shoes launcher identity</title>
    <link rel="icon" href="./assets/brand/project-new-shoes.ico" sizes="any">
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { display: grid; min-height: 100vh; margin: 0; place-items: center; color: #f1ead7; background: #111513; }
      main { width: min(90vw, 560px); padding: 48px; text-align: center; border: 1px solid #705f37; background: #181d1b; box-shadow: 0 24px 80px #0008; }
      img { width: min(70vw, 320px); height: auto; border-radius: 12%; box-shadow: 0 20px 42px #000a; }
      p { margin: 28px 0 6px; color: #d29538; font-size: .72rem; font-weight: 800; letter-spacing: .22em; }
      h1 { margin: 0 0 16px; font-size: clamp(2rem, 8vw, 3.4rem); text-transform: uppercase; }
      span { display: block; color: #b8bbb1; line-height: 1.6; }
      a { display: inline-block; margin-top: 28px; padding: 10px 18px; color: #111513; background: #d29538; font-weight: 800; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <img src="./assets/brand/project-new-shoes-mark.webp" alt="Project New Shoes launcher mark" width="1024" height="1024">
      <p>FINAL LAUNCHER IDENTITY</p>
      <h1>Project New Shoes</h1>
      <span>One text-free, square mark for the launcher, taskbar, browser tab, and installed app.</span>
      <a href="./play.html">Return to the command center</a>
    </main>
  </body>
</html>
