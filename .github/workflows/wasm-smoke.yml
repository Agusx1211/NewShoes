name: WebAssembly Smoke

on:
  push:
    paths:
      - ".github/workflows/wasm-smoke.yml"
      - ".github/actions/setup-wasm-build/action.yml"
      - "WebAssembly/**"
      - "Generals/Code/**"
      - "GeneralsMD/Code/**"
  pull_request:
    paths:
      - ".github/workflows/wasm-smoke.yml"
      - ".github/actions/setup-wasm-build/action.yml"
      - "WebAssembly/**"
      - "Generals/Code/**"
      - "GeneralsMD/Code/**"

permissions:
  contents: read

concurrency:
  group: wasm-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wasm-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up build environment
        uses: ./.github/actions/setup-wasm-build

      - name: Install Chromium for Playwright
        working-directory: WebAssembly
        run: npx playwright install --with-deps chromium

      - name: Build wasm and run smoke checks
        env:
          EM_COMPILER_WRAPPER: ccache
        run: |
          source "${RUNNER_TEMP}/emsdk/emsdk_env.sh"
          cd WebAssembly
          npm run test:all
          ccache --show-stats
