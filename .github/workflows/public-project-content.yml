name: Public project content freshness

on:
  schedule:
    - cron: "23 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  freshness:
    name: Reject stale public project facts
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: WebAssembly/package-lock.json

      - name: Install exact dependencies
        working-directory: WebAssembly
        run: npm ci

      - name: Validate facts, evidence, and review dates
        working-directory: WebAssembly
        run: npm run test:public-project-content
